<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; font-size: 1rem; width: 100px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 1rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Kalender Generator</h1>
        <p>Kies een jaar om de PDF te genereren:</p>
        <form action="/generate" method="POST">
            <input type="number" name="year" value="{{ year }}" min="1900" max="2100">
            <br>
            <button type="submit">Download PDF (A3)</button>
        </form>
    </div>
</body>
</html>
